<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEE User Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            line-height: 1.7;
            font-size: 15px;
            text-align: left;
        }
        h1 { font-size: 28px; margin: 32px 0 16px; color: #1a1a1a; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        h2 { font-size: 22px; margin: 28px 0 12px; color: #1a1a1a; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        h3 { font-size: 18px; margin: 24px 0 8px; color: #333; }
        h4 { font-size: 15px; margin: 16px 0 6px; color: #444; }
        p { margin: 8px 0; }
        a { color: #667eea; }
        table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        th { background: #f5f5f5; font-weight: 600; }
        code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; font-family: 'SF Mono', Menlo, monospace; }
        pre { background: #f5f5f5; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
        pre code { background: none; padding: 0; }
        ul, ol { margin: 8px 0 8px 24px; }
        li { margin: 4px 0; }
        blockquote { border-left: 3px solid #667eea; padding-left: 16px; color: #555; margin: 12px 0; }
        strong { color: #1a1a1a; }
        hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
        img { max-width: 100%; }
        .loading { text-align: center; color: #888; padding: 60px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="content" class="loading">Loading user guide...</div>
    <script>
        // Enable heading IDs for anchor links
        const renderer = new marked.Renderer();
        renderer.heading = function({ tokens, depth }) {
            const text = this.parser.parseInline(tokens);
            const slug = text.toLowerCase().replace(/<[^>]*>/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            return `<h${depth} id="${slug}">${text}</h${depth}>`;
        };
        marked.use({ renderer });

        fetch('/user_guide.md')
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
                // Scroll to anchor if present
                if (window.location.hash) {
                    const el = document.getElementById(window.location.hash.slice(1));
                    if (el) el.scrollIntoView();
                }
            })
            .catch(() => {
                document.getElementById('content').innerHTML = '<p>Failed to load user guide.</p>';
            });
    </script>
</body>
</html>
